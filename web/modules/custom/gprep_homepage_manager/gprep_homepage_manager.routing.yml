gprep_homepage_manager.editorial_dashboard:
  path: '/admin/gprep/editorial'
  defaults:
    _controller: '\Drupal\gprep_homepage_manager\Controller\EditorialDashboardController::build'
    _title: 'GPREP Editorial'
  requirements:
    _permission: 'access gprep editorial dashboard'
  options:
    _admin_route: true

gprep_homepage_manager.stakeholders_page:
  path: '/stakeholders'
  defaults:
    _controller: '\Drupal\gprep_homepage_manager\Controller\EditorialDashboardController::stakeholdersPage'
    _title: 'Stakeholders'
  requirements:
    _permission: 'access content'

gprep_homepage_manager.news_admin:
  path: '/admin/gprep/news'
  defaults:
    _controller: '\Drupal\gprep_homepage_manager\Controller\EditorialDashboardController::newsRedirect'
  requirements:
    _permission: 'access gprep editorial dashboard'
  options:
    _admin_route: true

gprep_homepage_manager.faq_admin:
  path: '/admin/gprep/faq'
  defaults:
    _controller: '\Drupal\gprep_homepage_manager\Controller\EditorialDashboardController::faqRedirect'
  requirements:
    _permission: 'access gprep editorial dashboard'
  options:
    _admin_route: true

gprep_homepage_manager.resource_admin:
  path: '/admin/gprep/resources'
  defaults:
    _controller: '\Drupal\gprep_homepage_manager\Controller\EditorialDashboardController::resourceRedirect'
  requirements:
    _permission: 'access gprep editorial dashboard'
  options:
    _admin_route: true

gprep_homepage_manager.stakeholder_admin:
  path: '/admin/gprep/stakeholders'
  defaults:
    _controller: '\Drupal\gprep_homepage_manager\Controller\EditorialDashboardController::stakeholderRedirect'
  requirements:
    _permission: 'access gprep editorial dashboard'
  options:
    _admin_route: true

gprep_homepage_manager.enrolled_admin:
  path: '/admin/gprep/enrolled-members'
  defaults:
    _controller: '\Drupal\gprep_homepage_manager\Controller\EditorialDashboardController::enrolledMembersRedirect'
  requirements:
    _permission: 'access gprep editorial dashboard'
  options:
    _admin_route: true
